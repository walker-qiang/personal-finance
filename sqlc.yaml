version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries"
    schema:  "internal/db/migrations"
    gen:
      go:
        package: "sqlcgen"
        out:     "internal/db/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        overrides:
          - column: "assets.holding_cost_pct"
            go_type:
              import: "database/sql"
              type:   "NullFloat64"
          - column: "assets.expected_yield_pct"
            go_type:
              import: "database/sql"
              type:   "NullFloat64"
          - column: "assets.risk_level"
            go_type:
              import: "database/sql"
              type:   "NullString"
          - column: "assets.archived_at"
            go_type:
              import: "database/sql"
              type:   "NullString"
          - column: "snapshots.expected_yield_pct"
            go_type:
              import: "database/sql"
              type:   "NullFloat64"
          - column: "snapshots.actual_yield_pct"
            go_type:
              import: "database/sql"
              type:   "NullFloat64"
